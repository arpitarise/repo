<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arise OS - Modern HR, Attendance & Workspace Sync</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- React & Utilities -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <!-- jsPDF & AutoTable for Verification Dashboard Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --brand-50: #eff6ff;
            --brand-100: #dbeafe;
            --brand-500: #3b82f6;
            --brand-600: #2563eb;
            --brand-900: #1e3a8a;
            --status-p: #10b981;
            --status-a: #ef4444;
            --status-h: #f59e0b;
            --status-l: #6366f1; /* Premium Indigo for Leave */
        }

        body { 
            margin: 0; 
            background-color: #f8fafc; 
            overflow: hidden; 
            -webkit-font-smoothing: antialiased; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .text-brand-600 { color: var(--brand-600) !important; }
        .text-brand-700 { color: #1d4ed8 !important; }
        .bg-brand-50 { background-color: var(--brand-50) !important; }
        .bg-brand-100 { background-color: var(--brand-100) !important; }
        .bg-brand-600 { background-color: var(--brand-600) !important; }
        .border-brand-500 { border-color: var(--brand-500) !important; }
        .text-success {
            --bs-text-opacity: 1;
            color: black !important;
        }

        /* Status Colors Mapped */
        .bg-status-p { background-color: var(--status-p) !important; }
        .bg-status-a { background-color: var(--status-a) !important; }
        .bg-status-h { background-color: var(--status-h) !important; }
        .bg-status-l { background-color: var(--status-l) !important; }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* 7-Column Layout Grid for Calendar Row Alignment */
        .grid-7 {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
        }

        .day-card { transition: all 0.15s ease; outline: none; }
        .day-card:focus, .day-card.focused { 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.4) !important; 
            transform: translateY(-2px); 
            border-color: #3b82f6 !important; 
            z-index: 10; 
        }

        /* Upgraded Dialog Box Overlays to avoid under-the-element rendering issues */
        .modal-overlay { 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.6); 
            backdrop-filter: blur(4px); 
            z-index: 99999 !important; /* Forces overlays above sidebars, headers, and tabs */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .animate-pulse {
            animation: pulse 2s infinite;
        }

        input[type="date"]::-webkit-calendar-picker-indicator, 
        input[type="time"]::-webkit-calendar-picker-indicator { 
            cursor: pointer; 
            opacity: 0.6; 
            transition: 0.2s; 
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover, 
        input[type="time"]::-webkit-calendar-picker-indicator:hover { 
            opacity: 1; 
        }

        .time-grid::-webkit-scrollbar { width: 6px; }
        .time-grid::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- React Application Logic -->
    <script type="text/babel" data-presets="react" data-type="module" src="app.js"></script>
</body>
</html>
